name: Publish to PyPI

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Validate version
        run: |
          VERSION=$(sed -n "s/^__version__ = '\(.*\)'/\1/p" lithoxyl/__init__.py)
          echo "Package version: $VERSION"
          if echo "$VERSION" | grep -qi 'dev'; then
            echo "::error::Version $VERSION contains dev suffix."
            exit 1
          fi
          TAG=${GITHUB_REF#refs/tags/}
          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match __version__ ($VERSION)"
            exit 1
          fi
      - name: Build package
        run: uv build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/lithoxyl
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  verify:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Wait for PyPI
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          for i in $(seq 1 30); do
            if curl -s -f "https://pypi.org/pypi/lithoxyl/$TAG/json" > /dev/null; then
              echo "lithoxyl $TAG available on PyPI"
              break
            fi
            echo "Waiting for PyPI propagation (attempt $i/30)..."
            sleep 10
          done
      - name: Install from PyPI and verify
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          uv pip install --system lithoxyl==$TAG --index-url https://pypi.org/simple/
          INSTALLED=$(cd /tmp && python -c "import lithoxyl; print(lithoxyl.__version__)")
          echo "Installed version: $INSTALLED"
          if [ "$INSTALLED" != "$TAG" ]; then
            echo "::error::Installed version $INSTALLED does not match tag $TAG"
            exit 1
          fi
      - name: Run tests
        run: |
          uv pip install --system pytest boltons
          pytest lithoxyl/tests/ -v
